services:
  - type: web
    name: livetix-web
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Live Tix
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_FORCE_HTTPS
        value: "true"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: AUTO_SEED
        value: "false"
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: in-v3.mailjet.com
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_SCHEME
        value: smtps
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: Live Tix
      - key: PAYMENT_PROVIDER
        value: paymongo
      - key: PAYMONGO_BASE_URL
        value: https://api.paymongo.com/v1
      - key: PAYMONGO_VERIFY_SSL
        value: "true"
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_PUBLIC_KEY
        sync: false
      - key: PAYMONGO_WEBHOOK_SECRET
        sync: false
