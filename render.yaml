services:
  - type: web
    name: livetix-web
    env: php
    plan: free
    rootDir: .
    buildCommand: |
      composer install --no-dev --optimize-autoloader --no-interaction
      npm install --no-audit --no-fund
      npm run build
    startCommand: |
      php artisan migrate --force
      php artisan config:cache
      php artisan view:cache
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: Live Tix
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_FORCE_HTTPS
        value: "true"
      - key: APP_FORCE_ROOT_URL
        sync: false
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: PAYMONGO_BASE_URL
        value: https://api.paymongo.com/v1
      - key: PAYMONGO_VERIFY_SSL
        value: "true"
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_PUBLIC_KEY
        sync: false
      - key: PAYMONGO_WEBHOOK_SECRET
        sync: false

  - type: worker
    name: livetix-worker
    env: php
    plan: free
    rootDir: .
    buildCommand: composer install --no-dev --optimize-autoloader --no-interaction
    startCommand: php artisan queue:work --sleep=1 --tries=3 --timeout=120
    envVars:
      - key: APP_NAME
        value: Live Tix
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_FORCE_HTTPS
        value: "true"
      - key: APP_FORCE_ROOT_URL
        sync: false
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: PAYMONGO_BASE_URL
        value: https://api.paymongo.com/v1
      - key: PAYMONGO_VERIFY_SSL
        value: "true"
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_PUBLIC_KEY
        sync: false
      - key: PAYMONGO_WEBHOOK_SECRET
        sync: false
